<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanya SMA — Asisten Informasi Sekolah</title>
<style>
  :root{
    --bg:#0d1117;
    --panel:#141b24;
    --panel-2:#1b2530;
    --ink:#e8edf2;
    --muted:#7d8ba0;
    --accent:#2fe6b8;
    --accent-2:#ff6b4a;
    --line:#24303d;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(1100px 600px at 85% -10%, rgba(47,230,184,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,107,74,.08), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .app{
    width:100%;
    max-width:480px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
    display:flex;
    flex-direction:column;
    height:min(720px, 90vh);
  }

  .header{
    padding:20px 22px;
    background:linear-gradient(135deg, #10161f, #0e141c);
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:12px;
  }
  .avatar{
    width:42px;height:42px;border-radius:12px;
    background:linear-gradient(135deg, var(--accent), #17b894);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;color:#03150f;font-size:18px;
    flex-shrink:0;
  }
  .header h1{font-size:15px;margin:0;letter-spacing:.2px;}
  .header p{margin:2px 0 0;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}

  .chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .chat::-webkit-scrollbar{width:6px;}
  .chat::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}

  .msg{
    max-width:82%;
    padding:11px 14px;
    border-radius:var(--radius);
    font-size:13.5px;
    line-height:1.55;
    white-space:pre-line;
    animation:pop .25s ease;
  }
  @keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .bot{
    align-self:flex-start;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-bottom-left-radius:4px;
  }
  .user{
    align-self:flex-end;
    background:linear-gradient(135deg, var(--accent), #1fbf98);
    color:#04140f;
    font-weight:600;
    border-bottom-right-radius:4px;
  }

  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:0 20px 14px;
  }
  .chip{
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--ink);
    font-size:12px;
    padding:7px 12px;
    border-radius:999px;
    cursor:pointer;
    transition:.15s;
  }
  .chip:hover{border-color:var(--accent);color:var(--accent);}

  .inputbar{
    display:flex;
    gap:10px;
    padding:16px;
    border-top:1px solid var(--line);
    background:#0f151d;
  }
  .inputbar input{
    flex:1;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--ink);
    padding:12px 14px;
    border-radius:12px;
    font-size:13.5px;
    outline:none;
  }
  .inputbar input:focus{border-color:var(--accent);}
  .inputbar button{
    background:var(--accent);
    border:none;
    color:#04140f;
    font-weight:700;
    padding:0 18px;
    border-radius:12px;
    cursor:pointer;
    font-size:13px;
  }
  .inputbar button:hover{background:#25d1a6;}

  .typing{display:flex;gap:4px;align-items:center;padding:4px 2px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="avatar">S</div>
    <div>
      <h1>Tanya SMA Nusantara</h1>
      <p><span class="dot"></span> Asisten informasi sekolah — online</p>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="chips" id="chips"></div>

  <div class="inputbar">
    <input type="text" id="userInput" placeholder="Tulis pertanyaan seputar sekolah..." />
    <button onclick="handleSend()">Kirim</button>
  </div>
</div>

<script>
// ====== Data pengetahuan sekolah (silakan sesuaikan) ======
const KB = [
  {
    keys: ["jam", "jadwal", "masuk", "pulang", "sekolah mulai"],
    answer: "Jam sekolah:\n• Senin–Kamis: 07.00 – 15.30\n• Jumat: 07.00 – 11.30\n• Sabtu & libur nasional: libur"
  },
  {
    keys: ["daftar", "pendaftaran", "ppdb", "masuk sekolah"],
    answer: "Pendaftaran siswa baru (PPDB) dibuka setiap bulan Juni–Juli.\nSyarat: fotokopi akta kelahiran, KK, rapor terakhir, dan pas foto 3x4.\nPendaftaran bisa online lewat website resmi atau langsung ke TU sekolah."
  },
  {
    keys: ["biaya", "spp", "uang sekolah", "bayaran"],
    answer: "Info biaya sekolah (SPP, uang pangkal, dan seragam) berbeda tiap jenjang. Silakan hubungi bagian Tata Usaha (TU) untuk rincian lengkap dan simulasi biaya."
  },
  {
    keys: ["ekstrakurikuler", "eskul", "kegiatan"],
    answer: "Ekstrakurikuler yang tersedia:\n• Pramuka\n• Basket & Futsal\n• Paduan Suara\n• Robotik & Coding Club\n• PMR\n• English Debate Club"
  },
  {
    keys: ["kontak", "telepon", "wa", "whatsapp", "email", "hubungi"],
    answer: "Kontak sekolah:\n📞 (031) 123-4567\n✉️ info@smanusantara.sch.id\n📱 WhatsApp TU: 0812-3456-7890"
  },
  {
    keys: ["alamat", "lokasi", "dimana", "di mana"],
    answer: "Alamat sekolah: Jl. Pendidikan No. 45, Surabaya, Jawa Timur.\nDekat dengan halte bus kota dan mudah diakses kendaraan umum."
  },
  {
    keys: ["guru", "pengajar", "wali kelas"],
    answer: "Data guru dan wali kelas dapat dilihat di papan pengumuman sekolah atau ditanyakan langsung ke bagian Kurikulum."
  },
  {
    keys: ["libur", "hari libur", "cuti bersama"],
    answer: "Kalender akademik dan hari libur mengikuti kalender pendidikan resmi dari Dinas Pendidikan setempat. Info detail tersedia di mading sekolah tiap semester."
  },
  {
    keys: ["seragam"],
    answer: "Seragam sekolah:\n• Senin–Selasa: Putih–abu\n• Rabu: Batik\n• Kamis: Pramuka\n• Jumat: Olahraga / muslim"
  },
  {
    keys: ["fasilitas"],
    answer: "Fasilitas sekolah: laboratorium komputer & IPA, perpustakaan, lapangan olahraga, kantin, mushola, dan ruang UKS."
  }
];

const fallback = "Maaf, aku belum punya info soal itu 🙏\nCoba tanyakan tentang: jadwal, pendaftaran, biaya, ekstrakurikuler, kontak, alamat, atau seragam.";
const suggestions = ["Jam sekolah?", "Cara daftar?", "Ekstrakurikuler apa saja?", "Kontak sekolah?", "Biaya SPP?"];

const chatEl = document.getElementById('chat');
const chipsEl = document.getElementById('chips');
const inputEl = document.getElementById('userInput');

function addMessage(text, sender){
  const div = document.createElement('div');
  div.className = 'msg ' + sender;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping(){
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingBubble';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping(){
  const t = document.getElementById('typingBubble');
  if(t) t.remove();
}

function getAnswer(text){
  const q = text.toLowerCase();
  for(const item of KB){
    if(item.keys.some(k => q.includes(k))) return item.answer;
  }
  return fallback;
}

function handleSend(){
  const text = inputEl.value.trim();
  if(!text) return;
  addMessage(text, 'user');
  inputEl.value = '';
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMessage(getAnswer(text), 'bot');
  }, 600 + Math.random()*400);
}

inputEl.addEventListener('keydown', e => {
  if(e.key === 'Enter') handleSend();
});

function renderChips(){
  chipsEl.innerHTML = '';
  suggestions.forEach(s => {
    const c = document.createElement('div');
    c.className = 'chip';
    c.textContent = s;
    c.onclick = () => { inputEl.value = s; handleSend(); };
    chipsEl.appendChild(c);
  });
}

// Pesan pembuka
addMessage("Halo! 👋 Aku Tanya, asisten informasi SMA Nusantara.\nAda yang bisa aku bantu soal sekolah?", 'bot');
renderChips();
</script>

</body>
</html>
